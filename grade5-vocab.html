<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>長興國小五年級英文單字翻翻樂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow-y: auto;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .header {
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .title-section {
            flex: 1;
        }

        .title {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: #667eea;
            font-weight: bold;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        .unit-selector {
            display: flex;
            gap: 6px;
        }

        .unit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: clamp(6px, 1.2vw, 8px) clamp(10px, 2vw, 15px);
            border-radius: 8px;
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            white-space: nowrap;
        }

        .unit-btn:hover {
            transform: translateY(-2px);
        }

        .unit-btn.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.05);
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .game-area {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 8px 15px;
            border-radius: 8px;
            text-align: center;
        }

        .info-label {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 2px;
        }

        .info-value {
            color: #667eea;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: clamp(6px, 1.5vmin, 12px);
            /* 自動計算正方形棋盤大小，填滿可用空間 */
            width:  min(55vw, calc(100vh - 140px));
            height: min(55vw, calc(100vh - 140px));
            max-width: 420px;
            max-height: 420px;
        }

        .flip-card {
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .card-inner,
        .flip-card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
            padding: 5px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: clamp(1.2rem, 3.5vmin, 2rem);
        }

        .card-back {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card-emoji {
            font-size: clamp(2rem, 5.5vmin, 4.5rem);
            line-height: 1;
        }

        .card-text {
            font-size: clamp(0.7rem, 2vmin, 1.2rem);
            text-align: center;
            line-height: 1.1;
            word-break: break-word;
            padding: 2px;
        }

        .flip-card.matched .card-back {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            animation: matchPulse 0.6s ease;
        }

        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.05); }
        }

        .card-back.mine {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            font-size: clamp(2.5rem, 6vmin, 5rem);
        }

        .flip-card.mine-hit .card-inner {
            animation: mineShake 0.5s ease;
        }

        @keyframes mineShake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-10px); }
            75% { transform: rotateY(180deg) translateX(10px); }
        }

        .control-panel {
            width: clamp(120px, 14vw, 160px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            justify-content: center;
        }

        /* 平板直向（portrait）或小螢幕：控制鍵移到底部橫排 */
        @media (max-width: 600px), (orientation: portrait) and (max-width: 820px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }
            .control-panel {
                width: 100%;
                flex-direction: row;
                justify-content: center;
                gap: 10px;
            }
            .control-panel .control-btn {
                flex: 1;
                max-width: 130px;
            }
            .game-board {
                width:  min(75vw, calc(100vh - 220px));
                height: min(75vw, calc(100vh - 220px));
                max-width: 380px;
                max-height: 380px;
            }
        }

        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: clamp(9px, 1.5vh, 12px) clamp(8px, 1.5vw, 15px);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(102, 126, 234, 0.3);
            text-align: center;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
        }

        .btn-en {
            font-size: clamp(0.75rem, 1.8vw, 0.95rem);
            display: block;
        }

        .btn-ch {
            font-size: clamp(0.6rem, 1.2vw, 0.7rem);
            opacity: 0.85;
            display: block;
            margin-top: 2px;
        }
            margin-top: 2px;
        }

        .control-btn.start {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .control-btn.restart {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .success-overlay, .freeze-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .success-overlay.show, .freeze-overlay.show {
            display: flex;
        }

        .success-message, .freeze-message {
            background: white;
            padding: clamp(20px, 4vw, 35px);
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease;
            max-width: 88vw;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon, .freeze-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .success-title {
            font-size: 1.8rem;
            color: #11998e;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .success-stats {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
        }

        .freeze-icon {
            animation: freezeShake 0.5s infinite;
        }

        @keyframes freezeShake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .freeze-title {
            font-size: 1.8rem;
            color: #f5576c;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .freeze-countdown {
            font-size: 2.5rem;
            color: #667eea;
            font-weight: bold;
        }

        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .countdown-overlay.show {
            display: flex;
        }

        .countdown-number {
            font-size: 8rem;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            animation: countdownPulse 1s ease;
        }

        @keyframes countdownPulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .waiting-message {
            text-align: center;
            color: #999;
            font-size: 1.1rem;
            padding: 40px 20px;
        }

        .waiting-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <div class="title">🎮 Vocabulary Matching Game 單字翻翻樂</div>
                <div class="subtitle">Match pictures with words! 配對圖片與單字！</div>
            </div>

            <div class="unit-selector">
                <button class="unit-btn" onclick="selectUnit('lesson1')">Lesson 1</button>
                <button class="unit-btn" onclick="selectUnit('lesson2')">Lesson 2</button>
                <button class="unit-btn" onclick="selectUnit('lesson3')">Lesson 3</button>
                <button class="unit-btn" onclick="selectUnit('lesson4')">Lesson 4</button>
            </div>
        </div>

        <div class="main-content">
            <div class="game-area">
                <div class="game-info">
                    <div class="info-item">
                        <div class="info-label">Moves 移動</div>
                        <div class="info-value" id="moves">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Matched 配對</div>
                        <div class="info-value"><span id="matches">0</span>/4</div>
                    </div>
                </div>

                <div class="game-board" id="gameBoard">
                    <div class="waiting-message" style="grid-column: 1/-1;">
                        <div class="waiting-icon">👉</div>
                        <div>請選擇單元並點擊「Start 開始」</div>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <button class="control-btn start" onclick="startGame()">
                    <span class="btn-en">▶️ Start</span>
                    <span class="btn-ch">開始</span>
                </button>
                <button class="control-btn restart" onclick="restartRound()">
                    <span class="btn-en">🔄 Restart</span>
                    <span class="btn-ch">重新開始</span>
                </button>
                <button class="control-btn" onclick="newRound()">
                    <span class="btn-en">🎲 New Round</span>
                    <span class="btn-ch">新題目</span>
                </button>
            </div>
        </div>
    </div>

    <div class="countdown-overlay" id="countdownOverlay">
        <div class="countdown-number" id="countdownNumber">3</div>
    </div>

    <div class="freeze-overlay" id="freezeOverlay">
        <div class="freeze-message">
            <div class="freeze-icon">💣</div>
            <div class="freeze-title">BOOM! Hit a Mine! 踩到地雷！</div>
            <div class="freeze-countdown" id="freezeCountdown">3</div>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-message">
            <div class="success-icon">🎉</div>
            <div class="success-title">Congratulations! 恭喜過關！</div>
            <div class="success-stats" id="successStats"></div>
            <button class="control-btn" onclick="closeSuccess()">Continue 繼續</button>
        </div>
    </div>

    <script>
        let currentUnit = null;
        let currentCards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let minePosition = -1;
        let gameStarted = false;
        let canFlip = true;

        const vocabularyData = {
            lesson1: [
                { emoji: '👨‍🍳', text: 'cooking' },
                { emoji: '💃', text: 'dancing' },
                { emoji: '🦘', text: 'jumping' },
                { emoji: '🏃', text: 'running' },
                { emoji: '😴', text: 'sleeping' },
                { emoji: '📚', text: 'studying' },
                { emoji: '✍️', text: 'writing' }
            ],
            lesson2: [
                { emoji: '🤒', text: 'fever' },
                { emoji: '🤧', text: 'runny nose' },
                { emoji: '🦷', text: 'toothache' },
                { emoji: '🤕', text: 'headache' },
                { emoji: '🦵', text: 'leg' },
                { emoji: '🦶', text: 'foot' },
                { emoji: '✋', text: 'hand' },
                { emoji: '👁️', text: 'eye' }
            ],
            lesson3: [
                { emoji: '🏞️', text: 'park' },
                { emoji: '📚', text: 'library' },
                { emoji: '🏥', text: 'hospital' },
                { emoji: '🛒', text: 'supermarket' },
                { emoji: '🛣️', text: 'road' },
                { emoji: '🧋', text: 'tea shop' },
                { emoji: '📮', text: 'post office' },
                { emoji: '🦁', text: 'zoo' },
                { emoji: '📖', text: 'bookstore' },
                { emoji: '➡️', text: 'next to' }
            ],
            lesson4: [
                { emoji: '🚲', text: 'by bike' },
                { emoji: '🛵', text: 'by scooter' },
                { emoji: '🚌', text: 'by bus' },
                { emoji: '👟', text: 'on foot' },
                { emoji: '🚗', text: 'by car' },
                { emoji: '🎯', text: 'get' },
                { emoji: '🚇', text: 'by metro' },
                { emoji: '🚆', text: 'by train' }
            ]
        };

        function selectUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            gameStarted = false;
        }

        function getRandomCards() {
            if (!currentUnit) return [];
            
            const vocab = vocabularyData[currentUnit];
            const shuffled = [...vocab].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 4);
        }

        function generateGameBoard() {
            const selectedVocab = getRandomCards();
            currentCards = [];
            
            selectedVocab.forEach((item, index) => {
                currentCards.push({
                    id: index,
                    type: 'emoji',
                    content: item.emoji,
                    pairId: index
                });
                currentCards.push({
                    id: index + 100,
                    type: 'text',
                    content: item.text,
                    pairId: index
                });
            });

            currentCards = shuffle(currentCards);
            
            minePosition = Math.floor(Math.random() * 9);
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function displayBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const card = document.createElement('div');
                card.className = 'flip-card';
                card.dataset.index = i;

                if (i === minePosition) {
                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-face card-front">?</div>
                            <div class="card-face card-back mine">💣</div>
                        </div>
                    `;
                } else {
                    const cardData = currentCards.shift();
                    if (cardData) {
                        card.dataset.pairId = cardData.pairId;
                        const isEmoji = cardData.type === 'emoji';
                        const displayContent = isEmoji 
                            ? `<div class="card-emoji">${cardData.content}</div>`
                            : `<div class="card-text">${cardData.content}</div>`;
                        
                        card.innerHTML = `
                            <div class="card-inner">
                                <div class="card-face card-front">?</div>
                                <div class="card-face card-back">${displayContent}</div>
                            </div>
                        `;
                    }
                }

                card.onclick = () => flipCard(card, i);
                board.appendChild(card);
            }
        }

        async function startGame() {
            if (!currentUnit) {
                alert('Please select a lesson first! 請先選擇單元！');
                return;
            }

            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0';

            generateGameBoard();
            displayBoard();

            await showCountdown();
            await peekCards();
            
            gameStarted = true;
        }

        async function showCountdown() {
            const overlay = document.getElementById('countdownOverlay');
            const number = document.getElementById('countdownNumber');
            
            for (let i = 3; i > 0; i--) {
                number.textContent = i;
                overlay.classList.add('show');
                await sleep(1000);
                overlay.classList.remove('show');
                await sleep(100);
            }
        }

        async function peekCards() {
            const cards = document.querySelectorAll('.flip-card');
            cards.forEach(card => card.classList.add('flipped'));
            await sleep(3000);
            cards.forEach(card => card.classList.remove('flipped'));
        }

        function flipCard(card, index) {
            if (!gameStarted || !canFlip) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            if (index === minePosition) {
                card.classList.add('flipped');
                card.classList.add('mine-hit');
                hitMine();
                return;
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const pair1 = card1.dataset.pairId;
            const pair2 = card2.dataset.pairId;

            if (pair1 === pair2) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('matches').textContent = matchedPairs;

                if (matchedPairs === 4) {
                    setTimeout(showSuccess, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                }, 1000);
            }

            flippedCards = [];
        }

        async function hitMine() {
            canFlip = false;
            const overlay = document.getElementById('freezeOverlay');
            const countdown = document.getElementById('freezeCountdown');
            
            overlay.classList.add('show');

            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }

            for (let i = 3; i > 0; i--) {
                countdown.textContent = i;
                await sleep(1000);
            }

            overlay.classList.remove('show');
            
            const cards = document.querySelectorAll('.flip-card');
            cards[minePosition].classList.remove('flipped');
            cards[minePosition].classList.remove('mine-hit');
            
            canFlip = true;
        }

        function showSuccess() {
            const stats = `Moves: ${moves} | 移動次數: ${moves}`;
            document.getElementById('successStats').textContent = stats;
            document.getElementById('successOverlay').classList.add('show');
        }

        function closeSuccess() {
            document.getElementById('successOverlay').classList.remove('show');
        }

        function restartRound() {
            if (!gameStarted) return;
            
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0';

            const cards = document.querySelectorAll('.flip-card');
            cards.forEach(card => {
                card.classList.remove('flipped', 'matched', 'mine-hit');
            });

            peekCards();
        }

        function newRound() {
            if (!currentUnit) {
                alert('Please select a lesson first! 請先選擇單元！');
                return;
            }
            startGame();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
